<svg width="1005" height="650" viewBox="0 0 1005 650" xmlns="http://www.w3.org/2000/svg">
    <!-- Fond Vert Profond -->
    <rect width="1005" height="650" fill="#003322" rx="20" ry="20"/>
    
    <!-- Texte GAELE à gauche -->
    <text x="120" y="320" font-family="'Playfair Display', serif" font-style="italic" font-weight="900" font-size="200" fill="white">Gaele.</text>
    <text x="120" y="420" font-family="Arial, sans-serif" font-weight="700" font-size="28" fill="white" letter-spacing="8" opacity="0.8">C'EST QUOI GAELE ?</text>

    <!-- Groupe QR Code à droite -->
    <g transform="translate(680, 220)">
        <!-- Support blanc QR -->
        <rect width="220" height="220" fill="white" rx="15" ry="15"/>
        <!-- QR Code (Simulation simplifiée pour le vecteur, mais fonctionnelle) -->
        <image x="10" y="10" width="200" height="200" href="https://api.qrserver.com/v1/create-qr-code/?size=200x200&amp;data=https://gaele-advisor.be&amp;color=003322" />
        
        <!-- Label sous le QR -->
        <text x="110" y="270" font-family="Arial, sans-serif" font-weight="900" font-size="24" fill="#D4AF37" text-anchor="middle" letter-spacing="2">OFFRE GRATUITE</text>
    </g>

    <!-- Accent décoratif -->
    <circle cx="1005" cy="0" r="200" fill="white" opacity="0.05" />
</svg>
