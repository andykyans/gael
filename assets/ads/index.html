<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Aperçu visuels Meta Ads</title>
  <style>
    body { margin: 0; font-family: Inter, sans-serif; background: #f3f0ea; color: #122E1D; }
    .page { max-width: 1280px; margin: 40px auto; padding: 0 24px; }
    h1 { margin-bottom: 16px; }
    .grid { display: grid; gap: 24px; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); }
    .card { padding: 16px; background: #fff; border-radius: 20px; box-shadow: 0 16px 40px rgba(17,34,17,.08); }
    .card img { width: 100%; border-radius: 14px; }
    .card h2 { margin: 16px 0 8px; font-size: 20px; }
    .card p { margin: 0; color: #475650; }
  </style>
</head>
<body>
  <div class="page">
    <h1>Prévisualisation des visuels Meta Ads</h1>
    <div class="grid">
      <div class="card"><h2>Visuel 1</h2><img src="meta-ad-1.svg" alt="Visuel 1"></div>
      <div class="card"><h2>Visuel 2</h2><img src="meta-ad-2.svg" alt="Visuel 2"></div>
      <div class="card"><h2>Visuel 3</h2><img src="meta-ad-3.svg" alt="Visuel 3"></div>
      <div class="card"><h2>Visuel 1 - version exemple</h2><img src="meta-ad-1-updated.svg" alt="Visuel 1 updated"></div>
      <div class="card"><h2>Visuel 2 - version exemple</h2><img src="meta-ad-2-updated.svg" alt="Visuel 2 updated"></div>
      <div class="card"><h2>Visuel 3 - version exemple</h2><img src="meta-ad-3-updated.svg" alt="Visuel 3 updated"></div>
    </div>
  </div>
</body>
</html>
