<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur de Carte GAELE - Canvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .controls { margin-bottom: 30px; text-align: center; max-width: 600px; line-height: 1.6; }
        .canvas-container { display: flex; flex-direction: column; gap: 40px; align-items: center; margin-top: 20px; }
        canvas { background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); cursor: pointer; border: 1px solid #e2e8f0; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { padding: 12px 24px; background: #003322; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-decoration: none; font-size: 13px; text-transform: uppercase; transition: transform 0.2s, background 0.2s; }
        .btn:hover { background: #054a33; transform: translateY(-2px); }
        .btn-gold { background: #D4AF37; }
        .btn-gold:hover { background: #b8952b; }
        h1 { color: #003322; text-transform: uppercase; letter-spacing: 2px; }
        .status { margin-top: 10px; font-size: 11px; color: #64748b; font-weight: bold; }
    </style>
</head>
<body>

    <div class="controls">
        <h1>Générateur de Carte Canvas</h1>
        <p>Utilisez cet outil pour générer les images finales de votre carte de visite (85x55mm). Cliquer sur un bouton pour télécharger le fichier PNG haute résolution.</p>
        <div class="status" id="status">Chargement des polices et des ressources...</div>
    </div>

    <div class="canvas-container">
        <!-- RECTO -->
        <div>
            <canvas id="canvasRecto" width="1005" height="650" style="width: 400px; height: 260px;"></canvas>
            <div class="btn-group">
                <a id="dlRecto" class="btn" href="#">Télécharger le Recto (PNG)</a>
            </div>
        </div>

        <!-- VERSO -->
        <div>
            <canvas id="canvasVerso" width="1005" height="650" style="width: 400px; height: 260px;"></canvas>
            <div class="btn-group">
                <a id="dlVerso" class="btn btn-gold" href="#">Télécharger le Verso (PNG)</a>
            </div>
        </div>
    </div>

    <script>
        const colors = {
            darkGreen: '#003322',
            gold: '#D4AF37',
            white: '#FFFFFF',
            slate: '#475569',
            lightSlate: '#94a3b8'
        };

        const details = {
            name: 'Kyambikwa Andy',
            email: 'infos@gaele-advisor.be',
            phone: '0470 43 22 11',
            site: 'gaele-advisor.be'
        };

        async function init() {
            // Attendre que les polices soient chargées
            await document.fonts.ready;
            document.getElementById('status').innerText = "Polices prêtes. Génération des cartes...";

            drawRecto();
            drawVerso();
            
            document.getElementById('status').innerText = "Cartes générées ! Cliquez sur les boutons pour les télécharger.";
        }

        function drawRecto() {
            const canvas = document.getElementById('canvasRecto');
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;

            // 1. Fond
            ctx.fillStyle = colors.white;
            ctx.fillRect(0, 0, w, h);

            // 2. Bordure Dorée supérieure
            ctx.fillStyle = colors.gold;
            ctx.fillRect(0, 0, w, 15);

            // 3. Logo GAELE (Hexagone)
            ctx.save();
            ctx.translate(60, 100);
            ctx.fillStyle = colors.darkGreen;
            ctx.beginPath();
            ctx.moveTo(56, 12); ctx.lineTo(100, 36); ctx.lineTo(100, 84); ctx.lineTo(56, 108); ctx.lineTo(12, 84); ctx.lineTo(12, 36);
            ctx.closePath();
            ctx.fill();
            // Éclair
            ctx.fillStyle = colors.gold;
            ctx.beginPath();
            ctx.moveTo(62, 28); ctx.lineTo(39, 61); ctx.lineTo(56, 61); ctx.lineTo(50, 83); ctx.lineTo(72, 50); ctx.lineTo(56, 50);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            // 4. Header Text
            ctx.textAlign = 'right';
            ctx.fillStyle = colors.darkGreen;
            ctx.font = '900 24px Inter';
            ctx.fillText("CONSEILLER ÉNERGIE GAELE / GAELE XL", 945, 65);
            ctx.fillStyle = colors.lightSlate;
            ctx.font = '700 24px Inter';
            ctx.fillText("GRIDLINK", 945, 100);

            // 5. Hero Text
            ctx.textAlign = 'left';
            ctx.fillStyle = colors.darkGreen;
            ctx.font = '900 52px Inter';
            ctx.fillText("RÉDUISEZ VOTRE FACTURE ÉNERGIE", 60, 320);
            ctx.fillStyle = colors.gold;
            ctx.font = '900 68px Inter';
            ctx.fillText("SANS INVESTIR", 60, 410);

            // 6. Footer Line
            ctx.strokeStyle = '#f1f5f9';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(60, 460); ctx.lineTo(945, 460);
            ctx.stroke();

            // 7. Contact Info
            ctx.fillStyle = colors.darkGreen;
            ctx.font = '900 42px Inter';
            ctx.fillText(details.name, 60, 530);

            ctx.font = '700 26px Inter';
            ctx.fillStyle = colors.gold;
            ctx.fillText("📞", 60, 580);
            ctx.fillStyle = colors.slate;
            ctx.fillText(details.phone, 105, 580);

            ctx.fillStyle = colors.gold;
            ctx.fillText("✉", 60, 620);
            ctx.fillStyle = colors.slate;
            ctx.fillText(details.email.toUpperCase(), 105, 620);

            // 8. Accent Bas Droite
            ctx.fillStyle = colors.darkGreen;
            ctx.beginPath();
            ctx.moveTo(920, 610); ctx.lineTo(1005, 610); ctx.lineTo(1005, 650); ctx.lineTo(940, 650);
            ctx.arcTo(920, 650, 920, 630, 20);
            ctx.closePath();
            ctx.fill();
            // Icone bouclier simple (Lignes)
            ctx.strokeStyle = colors.white;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(955, 635); ctx.lineTo(965, 645); ctx.lineTo(982, 628);
            ctx.stroke();

            // Bouton Téléchargement
            const dlRecto = document.getElementById('dlRecto');
            dlRecto.addEventListener('click', () => {
                dlRecto.href = canvas.toDataURL("image/png", 1.0);
                dlRecto.download = 'GAELE_Carte_Recto.png';
            });
        }

        function drawVerso() {
            const canvas = document.getElementById('canvasVerso');
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;

            // 1. Fond Vert
            ctx.fillStyle = colors.darkGreen;
            ctx.fillRect(0, 0, w, h);

            // 2. Cercle décoratif
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.beginPath();
            ctx.arc(1005, 0, 250, 0, Math.PI * 2);
            ctx.fill();

            // 3. Marque
            ctx.font = 'italic 900 240px "Playfair Display", serif';
            ctx.fillStyle = colors.white;
            ctx.textBaseline = 'middle';
            ctx.fillText("Gaele.", 100, 300);

            ctx.font = '700 32px Inter';
            ctx.letterSpacing = '10px';
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fillText("C'EST QUOI GAELE ?", 100, 440);

            // 4. QR Code Container
            const qrX = 680;
            const qrY = 180;
            const qrSize = 240;

            // Support Blanc
            ctx.fillStyle = colors.white;
            ctx.beginPath();
            ctx.roundRect(qrX, qrY, qrSize, qrSize, 20);
            ctx.fill();

            // Chargement de l'image QR
            const qrImg = new Image();
            qrImg.crossOrigin = "anonymous";
            qrImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://gaele-advisor.be&color=003322";
            qrImg.onload = function() {
                ctx.drawImage(qrImg, qrX + 20, qrY + 20, qrSize - 40, qrSize - 40);
                
                // Label sous QR
                ctx.textAlign = 'center';
                ctx.fillStyle = colors.gold;
                ctx.font = '900 28px Inter';
                ctx.letterSpacing = '2px';
                ctx.fillText("OFFRE GRATUITE", qrX + qrSize/2, qrY + qrSize + 45);
                
                // Bouton Téléchargement après le chargement de l'image
                const dlVerso = document.getElementById('dlVerso');
                dlVerso.addEventListener('click', () => {
                    dlVerso.href = canvas.toDataURL("image/png", 1.0);
                    dlVerso.download = 'GAELE_Carte_Verso.png';
                });
            };
        }

        window.onload = init;
    </script>
</body>
</html>
