<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Gaele Advisor</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --forest: #0A2E1A;
    --forest2: #0F3D23;
    --forest3: #15572F;
    --forest4: #1A7A3A;
    --cream: #FFFFFF;
    --cream2: #F7F7F8;
    --white: #FFFFFF;
    --muted: #6B7280;
    --muted2: #9CA3AF;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.12);
    --r: 12px;
    --font-display: 'Plus Jakarta Sans', sans-serif;
    --font-body: 'Plus Jakarta Sans', sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: #FFFFFF; color: var(--forest); min-height: 100vh; }

  /* ── HEADER ── */
  .admin-header {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    padding: 0 48px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .admin-logo {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--forest);
  }
  .admin-logo span {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: #9CA3AF;
    margin-left: 12px;
  }
  .btn-logout {
    background: rgba(0,0,0,0.04);
    border: 1px solid #E5E7EB;
    color: var(--forest);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 20px;
    border-radius: 100px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-logout:hover { background: rgba(0,0,0,0.08); }

  /* ── LOGIN ── */
  .login-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 70px);
    padding: 20px;
  }
  .login-box {
    background: #fff;
    border: 1px solid #E5E7EB;
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .login-title {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    color: var(--forest2);
    margin-bottom: 8px;
  }
  .login-sub {
    font-size: 14px;
    color: #6B7280;
    margin-bottom: 32px;
  }
  .login-input {
    display: block;
    width: 100%;
    background: #F9FAFB;
    border: 1.5px solid #E5E7EB;
    border-radius: 8px;
    padding: 14px 16px;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--forest);
    outline: none;
    margin-bottom: 12px;
    transition: border-color .2s;
  }
  .login-input:focus { border-color: var(--forest2); }
  .login-input::placeholder { color: #9CA3AF; }
  .login-btn {
    width: 100%;
    background: var(--forest2);
    color: #fff;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 700;
    padding: 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s;
    margin-top: 8px;
  }
  .login-btn:hover { box-shadow: 0 6px 24px rgba(15,61,35,0.3); transform: translateY(-1px); }
  .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
  .login-error {
    background: rgba(255,80,80,0.08);
    border: 1px solid rgba(255,80,80,0.2);
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    color: #EF4444;
    margin-bottom: 16px;
    display: none;
  }
  .login-toggle {
    margin-top: 20px;
    font-size: 13px;
    color: #6B7280;
  }
  .login-toggle a {
    color: var(--forest2);
    text-decoration: none;
    cursor: pointer;
  }
  .login-toggle a:hover { text-decoration: underline; }

  /* ── DASHBOARD ── */
  .dashboard { display: none; padding: 32px 48px; max-width: 1400px; margin: 0 auto; }
  .dash-title {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 700;
    color: var(--forest);
    margin-bottom: 8px;
  }
  .dash-stats {
    display: flex;
    gap: 24px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: #fff;
    border: 1px solid #E5E7EB;
    border-radius: var(--r);
    padding: 20px 28px;
    min-width: 160px;
  }
  .stat-n {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 700;
    color: var(--forest2);
    line-height: 1;
  }
  .stat-l {
    font-size: 12px;
    color: #9CA3AF;
    margin-top: 4px;
  }

  /* ── TABLE ── */
  .table-wrap {
    background: #fff;
    border: 1px solid #E5E7EB;
    border-radius: 14px;
    overflow-x: auto;
  }
  .prospects-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 1000px;
  }
  .prospects-table th {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #6B7280;
    padding: 16px 16px;
    text-align: left;
    border-bottom: 1px solid #E5E7EB;
    white-space: nowrap;
    background: #F9FAFB;
  }
  .prospects-table td {
    padding: 14px 16px;
    font-size: 13px;
    color: #4B5563;
    border-bottom: 1px solid #F3F4F6;
    vertical-align: top;
  }
  .prospects-table tr:hover td { background: #F9FAFB; }
  .prospects-table td:first-child { color: #9CA3AF; font-size: 12px; }
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 100px;
    letter-spacing: .06em;
    text-transform: uppercase;
  }
  .badge-xl { background: rgba(15,61,35,0.08); color: var(--forest2); border: 1px solid rgba(15,61,35,0.2); }
  .badge-courtier { background: #F3F4F6; color: #6B7280; border: 1px solid #E5E7EB; }
  .badge-yolk { background: rgba(232,160,32,0.08); color: #D97706; border: 1px solid rgba(232,160,32,0.2); }
  .prospects-table tbody tr { cursor: pointer; }
  .prospects-table a { color: var(--forest2); text-decoration: none; transition: color .2s; }
  .prospects-table a:hover { color: var(--forest3); text-decoration: underline; }
  .has-msg { color: var(--forest2); font-size: 12px; }
  .no-msg { color: #9CA3AF; font-size: 12px; }
  .empty-state {
    text-align: center;
    padding: 64px 20px;
    color: #9CA3AF;
    font-size: 15px;
  }
  .empty-state span { display: block; font-size: 48px; margin-bottom: 16px; }

  /* ── PAGINATION ── */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 24px;
  }
  .page-btn {
    background: #fff;
    border: 1px solid #E5E7EB;
    color: #6B7280;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--forest2); color: var(--forest2); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-btn.active { background: var(--forest2); color: #fff; border-color: var(--forest2); font-weight: 700; }
  .page-info { font-size: 13px; color: #9CA3AF; margin: 0 8px; }

  /* ── DETAIL MODAL ── */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .detail-overlay.open { display: flex; }
  .detail-box {
    background: #fff;
    border: 1px solid #E5E7EB;
    border-radius: 20px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,0.15);
    animation: detailIn .3s cubic-bezier(.16,1,.3,1);
  }
  @keyframes detailIn { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: none; } }
  .detail-header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid #E5E7EB;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .detail-name {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    color: var(--forest);
    line-height: 1.1;
  }
  .detail-date { font-size: 12px; color: #9CA3AF; margin-top: 6px; }
  .detail-close {
    background: #F3F4F6;
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    min-width: 36px;
    cursor: pointer;
    color: var(--forest);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s;
  }
  .detail-close:hover { background: #E5E7EB; }
  .detail-body { padding: 24px 32px 28px; }
  .detail-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .detail-action {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 100px;
    text-decoration: none;
    transition: all .2s;
  }
  .detail-action.email { background: rgba(15,61,35,0.06); border: 1px solid rgba(15,61,35,0.2); color: var(--forest2); }
  .detail-action.email:hover { background: var(--forest2); color: #fff; }
  .detail-action.tel { background: #25D366; color: #fff; border: none; }
  .detail-action.tel:hover { background: #1FAD54; }
  .detail-row {
    display: flex;
    padding: 10px 0;
    border-bottom: 1px solid #F3F4F6;
    gap: 12px;
  }
  .detail-row:last-child { border: none; }
  .detail-label {
    font-size: 12px;
    font-weight: 600;
    color: #9CA3AF;
    text-transform: uppercase;
    letter-spacing: .08em;
    min-width: 110px;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .detail-value { font-size: 14px; color: #4B5563; line-height: 1.6; word-break: break-word; }
  .detail-message {
    margin-top: 20px;
    background: #F9FAFB;
    border: 1px solid #E5E7EB;
    border-radius: 10px;
    padding: 20px;
  }
  .detail-message-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--forest2);
    text-transform: uppercase;
    letter-spacing: .14em;
    margin-bottom: 10px;
  }
  .detail-message-text {
    font-size: 14px;
    color: #4B5563;
    line-height: 1.75;
    white-space: pre-wrap;
  }

  @media(max-width: 768px) {
    .admin-header { padding: 0 20px; }
    .dashboard { padding: 24px 16px; }
    .login-box { padding: 36px 24px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="admin-header">
  <div class="admin-logo">
    Gaele Advisor <span>Admin</span>
  </div>
  <button class="btn-logout" id="btn-logout" style="display:none" onclick="logout()">Déconnexion</button>
</header>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div class="login-title">Administration</div>
    <div class="login-sub">Connectez-vous pour accéder aux prospects</div>
    <div class="login-error" id="login-error"></div>
    <input class="login-input" id="login-email" type="email" placeholder="Email">
    <input class="login-input" id="login-password" type="password" placeholder="Mot de passe">
    <button class="login-btn" id="login-btn" onclick="login()">Se connecter</button>
    <div class="login-toggle" id="login-toggle">
      Première connexion ? <a onclick="toggleSignup()">Créer un compte</a>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="dash-title">Prospects</div>
  <div class="dash-stats">
    <div class="stat-card">
      <div class="stat-n" id="stat-total">0</div>
      <div class="stat-l">Total prospects</div>
    </div>
    <div class="stat-card">
      <div class="stat-n" id="stat-today">0</div>
      <div class="stat-l">Aujourd'hui</div>
    </div>
    <div class="stat-card">
      <div class="stat-n" id="stat-week">0</div>
      <div class="stat-l">Cette semaine</div>
    </div>
  </div>
  <div class="table-wrap">
    <table class="prospects-table" id="prospects-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Prénom</th>
          <th>Nom</th>
          <th>Email</th>
          <th>Téléphone</th>
          <th>Code postal</th>
          <th>Région</th>
          <th>Statut</th>
          <th>Offre</th>
          <th>Msg</th>
        </tr>
      </thead>
      <tbody id="prospects-body"></tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- DETAIL MODAL -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-box">
    <div class="detail-header">
      <div>
        <div class="detail-name" id="detail-name"></div>
        <div class="detail-date" id="detail-date"></div>
      </div>
      <button class="detail-close" onclick="closeDetail()">&times;</button>
    </div>
    <div class="detail-body">
      <div class="detail-actions" id="detail-actions"></div>
      <div id="detail-fields"></div>
      <div class="detail-message" id="detail-message-wrap">
        <div class="detail-message-label">Message</div>
        <div class="detail-message-text" id="detail-message-text"></div>
      </div>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://adebczvhvxajiyeeyerx.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkZWJjenZodnhhaml5ZWV5ZXJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NzE2MDIsImV4cCI6MjA4NzQ0NzYwMn0._wGnpo7sHJeGYHLLdATgWxss8ySVnCZ0UQU5VB6nhhY';
var ADMIN_EMAILS = ['bmf.amk@gmail.com', 'fabrice.kyams@gmail.com'];
var _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

var isSignupMode = false;
var allProspects = [];
var currentPage = 1;
var PAGE_SIZE = 15;

function toggleSignup() {
  isSignupMode = !isSignupMode;
  document.getElementById('login-btn').textContent = isSignupMode ? 'Créer le compte' : 'Se connecter';
  document.getElementById('login-toggle').innerHTML = isSignupMode
    ? 'Déjà un compte ? <a onclick="toggleSignup()">Se connecter</a>'
    : 'Première connexion ? <a onclick="toggleSignup()">Créer un compte</a>';
  document.getElementById('login-error').style.display = 'none';
}

function showError(msg) {
  var el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function login() {
  var email = document.getElementById('login-email').value.trim();
  var password = document.getElementById('login-password').value;
  document.getElementById('login-error').style.display = 'none';

  if (!email || !password) { showError('Veuillez remplir tous les champs.'); return; }
  if (ADMIN_EMAILS.indexOf(email) === -1) { showError('Accès réservé à l\'administrateur.'); return; }

  var btn = document.getElementById('login-btn');
  btn.disabled = true;

  try {
    var result;
    if (isSignupMode) {
      result = await _supabase.auth.signUp({ email: email, password: password });
    } else {
      result = await _supabase.auth.signInWithPassword({ email: email, password: password });
    }

    if (result.error) { showError(result.error.message); btn.disabled = false; return; }

    if (isSignupMode && result.data.user && !result.data.session) {
      showError('Compte créé ! Vérifiez votre email pour confirmer, puis reconnectez-vous.');
      isSignupMode = false;
      document.getElementById('login-btn').textContent = 'Se connecter';
      btn.disabled = false;
      return;
    }

    showDashboard();
  } catch (err) {
    showError('Erreur de connexion.');
    btn.disabled = false;
  }
}

async function logout() {
  await _supabase.auth.signOut();
  document.getElementById('login-screen').style.display = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('login-password').value = '';
}

async function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('btn-logout').style.display = '';
  await loadProspects();
}

async function loadProspects() {
  var { data, error } = await _supabase
    .from('prospects')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.error('Error loading prospects:', error);
    return;
  }

  allProspects = data || [];

  // Stats
  var now = new Date();
  var todayStr = now.toISOString().slice(0, 10);
  var weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000).toISOString();
  var todayCount = allProspects.filter(function(p) { return p.created_at && p.created_at.slice(0, 10) === todayStr; }).length;
  var weekCount = allProspects.filter(function(p) { return p.created_at && p.created_at >= weekAgo; }).length;

  document.getElementById('stat-total').textContent = allProspects.length;
  document.getElementById('stat-today').textContent = todayCount;
  document.getElementById('stat-week').textContent = weekCount;

  currentPage = 1;
  renderPage();
}

function renderPage() {
  var regionNames = { wal: 'Wallonie', fla: 'Flandre', bxl: 'Bruxelles' };
  var statutNames = { proprio: 'Propriétaire', locataire: 'Locataire' };
  var tbody = document.getElementById('prospects-body');

  if (allProspects.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10"><div class="empty-state"><span>\uD83D\uDCED</span>Aucun prospect pour le moment.</div></td></tr>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  var totalPages = Math.ceil(allProspects.length / PAGE_SIZE);
  var start = (currentPage - 1) * PAGE_SIZE;
  var pageData = allProspects.slice(start, start + PAGE_SIZE);

  tbody.innerHTML = pageData.map(function(p, idx) {
    var globalIdx = start + idx;
    var date = p.created_at ? new Date(p.created_at).toLocaleString('fr-BE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '-';
    var region = regionNames[p.region] || '-';
    var statut = statutNames[p.statut] || '-';
    var offreBadge = '';
    if (p.offre_recommandee) {
      var cls = 'badge ';
      if (p.offre_recommandee.includes('XL')) cls += 'badge-xl';
      else if (p.offre_recommandee.includes('Yolk')) cls += 'badge-yolk';
      else cls += 'badge-courtier';
      offreBadge = '<span class="' + cls + '">' + escapeHtml(p.offre_recommandee) + '</span>';
    } else {
      offreBadge = '-';
    }
    var emailLink = '<a href="mailto:' + escapeAttr(p.email) + '" onclick="event.stopPropagation()">' + escapeHtml(p.email) + '</a>';
    var telLink = '<a href="tel:' + escapeAttr(p.telephone) + '" onclick="event.stopPropagation()">' + escapeHtml(p.telephone) + '</a>';
    var msgIndicator = p.message ? '<span class="has-msg">Oui</span>' : '<span class="no-msg">-</span>';
    return '<tr onclick="openDetail(' + globalIdx + ')">' +
      '<td>' + date + '</td>' +
      '<td>' + escapeHtml(p.prenom) + '</td>' +
      '<td>' + escapeHtml(p.nom) + '</td>' +
      '<td>' + emailLink + '</td>' +
      '<td>' + telLink + '</td>' +
      '<td>' + escapeHtml(p.code_postal) + '</td>' +
      '<td>' + region + '</td>' +
      '<td>' + statut + '</td>' +
      '<td>' + offreBadge + '</td>' +
      '<td>' + msgIndicator + '</td>' +
    '</tr>';
  }).join('');

  // Pagination
  var pagEl = document.getElementById('pagination');
  if (totalPages <= 1) { pagEl.innerHTML = ''; return; }

  var html = '<button class="page-btn" onclick="goPage(' + (currentPage - 1) + ')"' + (currentPage === 1 ? ' disabled' : '') + '>&larr; Préc.</button>';
  for (var i = 1; i <= totalPages; i++) {
    if (totalPages > 7 && i > 3 && i < totalPages - 1 && Math.abs(i - currentPage) > 1) {
      if (i === 4 || i === totalPages - 2) html += '<span class="page-info">...</span>';
      continue;
    }
    html += '<button class="page-btn' + (i === currentPage ? ' active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
  }
  html += '<button class="page-btn" onclick="goPage(' + (currentPage + 1) + ')"' + (currentPage === totalPages ? ' disabled' : '') + '>Suiv. &rarr;</button>';
  html += '<span class="page-info">' + allProspects.length + ' prospects</span>';
  pagEl.innerHTML = html;
}

function goPage(n) {
  var totalPages = Math.ceil(allProspects.length / PAGE_SIZE);
  if (n < 1 || n > totalPages) return;
  currentPage = n;
  renderPage();
  document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function openDetail(idx) {
  var p = allProspects[idx];
  if (!p) return;
  var regionNames = { wal: 'Wallonie', fla: 'Flandre', bxl: 'Bruxelles' };
  var statutNames = { proprio: 'Propriétaire', locataire: 'Locataire' };
  var date = p.created_at ? new Date(p.created_at).toLocaleString('fr-BE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '-';

  document.getElementById('detail-name').textContent = p.prenom + ' ' + p.nom;
  document.getElementById('detail-date').textContent = date;

  document.getElementById('detail-actions').innerHTML =
    '<a class="detail-action email" href="mailto:' + escapeAttr(p.email) + '">' + escapeHtml(p.email) + '</a>' +
    '<a class="detail-action tel" href="tel:' + escapeAttr(p.telephone) + '">' + escapeHtml(p.telephone) + '</a>';

  var fields = [
    ['Code postal', p.code_postal],
    ['Région', regionNames[p.region] || '-'],
    ['Statut', statutNames[p.statut] || '-'],
    ['Offre', p.offre_recommandee || '-'],
    ['Date RDV', p.date_rdv || '-']
  ];
  document.getElementById('detail-fields').innerHTML = fields.map(function(f) {
    return '<div class="detail-row"><div class="detail-label">' + f[0] + '</div><div class="detail-value">' + escapeHtml(f[1]) + '</div></div>';
  }).join('');

  var msgWrap = document.getElementById('detail-message-wrap');
  if (p.message) {
    document.getElementById('detail-message-text').textContent = p.message;
    msgWrap.style.display = '';
  } else {
    msgWrap.style.display = 'none';
  }

  document.getElementById('detail-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('detail-overlay').addEventListener('click', function(e) {
  if (e.target === document.getElementById('detail-overlay')) closeDetail();
});

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escapeAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Check existing session on load
(async function() {
  var { data } = await _supabase.auth.getSession();
  if (data.session && data.session.user && ADMIN_EMAILS.indexOf(data.session.user.email) !== -1) {
    showDashboard();
  }
})();

// Allow Enter key to submit login
document.getElementById('login-password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});
</script>
