<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Carte de Visite GAELE - Prêt à Imprimer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-green: #003322;
            --gold: #D4AF37;
            --white: #FFFFFF;
            --slate: #475569;
        }

        /* PRINT SETTINGS */
        @page {
            size: 85mm 55mm;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }

        .card {
            width: 85mm;
            height: 55mm;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            background: white;
            margin: 10mm auto;
            border-radius: 2mm;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        /* RECTO */
        .recto .card-inner {
            padding: 6mm;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .gold-border {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1.2mm;
            background: var(--gold);
        }

        .logo-box {
            width: 14mm;
            height: 14mm;
            margin-bottom: 2mm;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .header-text {
            text-align: right;
            margin-top: 1mm;
        }

        .header-text .title {
            font-size: 7pt;
            font-weight: 900;
            color: var(--dark-green);
            text-transform: uppercase;
        }

        .header-text .agency {
            font-size: 7pt;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5pt;
        }

        .hero {
            margin-top: 1mm;
        }

        .hero h1 {
            font-size: 15pt;
            font-weight: 900;
            color: var(--dark-green);
            margin: 0;
            line-height: 1;
        }

        .hero h2 {
            font-size: 16pt;
            font-weight: 900;
            color: var(--gold);
            margin: 0;
            text-transform: uppercase;
            margin-top: 1mm;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: auto;
        }

        .name {
            font-size: 13pt;
            font-weight: 900;
            color: var(--dark-green);
            margin-bottom: 2mm;
        }

        .contact-row {
            display: flex;
            align-items: center;
            gap: 2mm;
            font-size: 7pt;
            font-weight: 700;
            color: var(--slate);
            margin-top: 1mm;
            text-transform: uppercase;
        }

        .contact-row span {
            color: var(--gold);
            font-size: 9pt;
        }

        .recto-accent {
            background: var(--dark-green);
            width: 8mm;
            height: 4mm;
            border-radius: 1.5mm 0 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            position: absolute;
            bottom: 0;
            right: 0;
        }

        /* VERSO */
        .verso {
            background: var(--dark-green);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10mm;
        }

        .verso-brand {
            flex: 1;
        }

        .verso-brand h2 {
            font-family: 'Playfair Display', serif;
            font-size: 45pt;
            font-style: italic;
            margin: 0;
            line-height: 0.8;
        }

        .verso-brand p {
            font-size: 8pt;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2pt;
            margin-top: 4mm;
            opacity: 0.8;
        }

        .verso-qr-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3mm;
        }

        .qr-box {
            background: white;
            padding: 2mm;
            border-radius: 2mm;
            width: 22mm;
            height: 22mm;
        }

        .qr-box img {
            width: 100%;
            height: 100%;
        }

        .qr-label {
            font-size: 7pt;
            font-weight: 900;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1pt;
        }

        @media print {
            .card { margin: 0; box-shadow: none; border-radius: 0; }
            body { background: white; }
        }
    </style>
</head>
<body>

    <!-- RECTO -->
    <div class="card recto" id="recto">
        <div class="gold-border"></div>
        <div class="card-inner">
            <div class="header-top">
                <div class="logo-box">
                    <svg viewBox="0 0 100 100">
                        <path d="M50 5 L90 27.5 L90 72.5 L50 95 L10 72.5 L10 27.5 Z" fill="#003322" />
                        <path d="M55 25 L35 55 L50 55 L45 75 L65 45 L50 45 Z" fill="#D4AF37" />
                    </svg>
                </div>
                <div class="header-text">
                    <div class="title">CONSEILLER ÉNERGIE GAELE / GAELE XL</div>
                    <div class="agency">GRIDLINK</div>
                </div>
            </div>

            <div class="hero">
                <h1>RÉDUISEZ VOTRE FACTURE ÉNERGIE</h1>
                <h2>SANS INVESTIR</h2>
            </div>

            <div class="footer">
                <div>
                    <div class="name">Andy Kyambikwa</div>
                    <div class="contact-row">
                        <span>&#9742;</span> 0470 43 22 11
                    </div>
                    <div class="contact-row">
                        <span>&#9993;</span> INFOS@GAELE-ADVISOR.BE
                    </div>
                </div>
            </div>
            <div class="recto-accent">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
            </div>
        </div>
    </div>

    <!-- VERSO -->
    <div class="card verso" id="verso">
        <div class="verso-brand">
            <h2>Gaele.</h2>
            <p>C'EST QUOI GAELE ?</p>
        </div>
        <div class="verso-qr-wrap">
            <div class="qr-box">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://gaele-advisor.be&color=003322" alt="QR Code">
            </div>
            <div class="qr-label">OFFRE GRATUITE</div>
        </div>
    </div>

</body>
</html>

</body>
</html>
